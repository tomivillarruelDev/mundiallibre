<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    video { width: 100%; height: calc(100% - 160px); object-fit: contain; display: block; }
    #dbg-wrap { height: 160px; background: #0a0a0a; border-top: 1px solid #0f0; }
    #dbg { width: 100%; height: 120px; background: #0a0a0a; color: #0f0; font: 10px monospace; border: none; padding: 4px; resize: none; display: block; }
    #dbg-copy { width: 100%; height: 40px; background: #000; color: #0f0; border: 1px solid #0f0; font: bold 12px monospace; cursor: pointer; display: block; }
  </style>
</head>
<body>
  <video id="v" playsinline controls></video>
  <div id="dbg-wrap">
    <textarea id="dbg" readonly></textarea>
    <button id="dbg-copy">COPIAR LOG</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/shaka-player@5.0.5/dist/shaka-player.compiled.min.js"></script>
  <script type="module">
    import { createIOSDecryptor } from './js/modules/ios-cenc-decryptor.js';

    const video = document.getElementById('v');
    const dbg   = document.getElementById('dbg');
    const ts    = () => new Date().toISOString().slice(11, 22);
    const log   = (m) => {
      dbg.value += ts() + ' ' + m + '\n';
      if (dbg.value.length > 8000) dbg.value = dbg.value.slice(-6000);
      dbg.scrollTop = dbg.scrollHeight;
    };
    document.getElementById('dbg-copy').addEventListener('click', () => {
      navigator.clipboard.writeText(dbg.value).catch(() => { dbg.select(); document.execCommand('copy'); });
    });

    // Video events
    ['play','pause','playing','ended','stalled','waiting','suspend','emptied','canplay','loadedmetadata'].forEach(ev =>
      video.addEventListener(ev, () => log('[video] ' + ev + ' rs=' + video.readyState + ' paused=' + video.paused))
    );
    video.addEventListener('error', () => log('[video.error] code=' + video.error?.code));
    document.addEventListener('visibilitychange', () => log('[vis] ' + document.visibilityState));

    let player          = null;
    let manifest        = null;
    let reloadInProgress = false;
    let reloadAttempts  = 0;

    const sendError = (reason) => {
      log('[ERROR] ' + reason + ' — fallback en 15s');
      setTimeout(() => window.parent.postMessage({ type: 'player-frame-error' }, '*'), 15000);
    };

    // Reload after MMS destruction
    video.addEventListener('emptied', () => {
      if (reloadInProgress || !player || !manifest) return;
      if (reloadAttempts >= 5) { sendError('max reloads'); return; }
      video.pause(); // cancel any pending autoplay play() on rs=0
      reloadInProgress = true;
      reloadAttempts++;
      log('[reload] emptied #' + reloadAttempts);

      (async () => {
        if (video.readyState >= 3) { reloadInProgress = false; return; }
        try {
          log('[reload] load()...');
          await player.load(manifest);
          log('[reload] ok rs=' + video.readyState);
          if (video.readyState >= 3) {
            video.play().catch(() => {});
          } else {
            video.addEventListener('canplay', () => { log('[reload] canplay→play'); video.play().catch(() => {}); }, { once: true });
          }
        } catch (e) {
          log('[reload] FAILED ' + e);
          sendError('reload falló: ' + e);
        } finally {
          reloadInProgress = false;
        }
      })();
    });

    async function startPlayer(cfg) {
      try {
        manifest = cfg.manifest;
        log('[start] manifest=' + manifest.slice(0, 60));
        log('[start] shaka=' + (typeof shaka !== 'undefined' ? 'ok' : 'NO CARGADO'));

        shaka.polyfill.installAll();
        if (window.ManagedMediaSource) { video.disableRemotePlayback = true; log('[start] MMS ok'); }

        player = new shaka.Player(video);
        log('[start] player creado');

        const decryptor = await createIOSDecryptor(cfg.key);
        log('[start] decryptor ok');

        const net = player.getNetworkingEngine();

        net.registerResponseFilter((type, response) => {
          if (type !== shaka.net.NetworkingEngine.RequestType.MANIFEST) return;
          const xml = new TextDecoder().decode(new Uint8Array(response.data));
          response.data = new TextEncoder().encode(
            xml.replace(/<ContentProtection\b[^>]*\/>/g, '')
               .replace(/<ContentProtection\b[\s\S]*?<\/ContentProtection>/g, '')
          ).buffer;
        });

        net.registerResponseFilter(async (type, response) => {
          if (type !== shaka.net.NetworkingEngine.RequestType.SEGMENT) return;
          const bytes = new Uint8Array(response.data);
          const box = bytes.length >= 8 ? String.fromCharCode(bytes[4], bytes[5], bytes[6], bytes[7]) : '';
          if (box === 'ftyp' || box === 'moov') {
            response.data = decryptor.transformInit(response.data);
          } else {
            response.data = await decryptor.decryptMedia(response.data);
          }
        });

        player.configure({
          manifest: { dash: { clockSyncUri: '' } },
          streaming: { bufferingGoal: 20, rebufferingGoal: 10, lowLatencyMode: false }
        });

        player.addEventListener('error', (event) => {
          log('[shaka] code=' + event.detail.code + ' sev=' + event.detail.severity);
          if (event.detail.severity !== 2 || reloadInProgress) return;
          setTimeout(() => { if (!reloadInProgress) { log('[shaka] retryStreaming'); player.retryStreaming(); } }, 500);
        });

        log('[start] llamando load()...');
        await player.load(manifest);
        log('[start] load ok rs=' + video.readyState);
        video.play().catch(e => log('[start] play bloqueado: ' + e));

      } catch (e) {
        sendError(String(e));
      }
    }

    video.addEventListener('playing', () => { reloadAttempts = 0; });

    window.addEventListener('message', ({ data }) => {
      if (data?.type === 'player-frame-init') {
        log('[frame] config recibida');
        startPlayer(data.config);
      }
    });

    log('[frame] ready → padre');
    window.parent.postMessage({ type: 'player-frame-ready' }, '*');
    setTimeout(() => { if (!manifest) log('[frame] WARN: sin config tras 3s'); }, 3000);
  </script>
</body>
</html>
