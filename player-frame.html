<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: contain; display: block; }
    #overlay {
      display: none; position: absolute; inset: 0;
      background: rgba(0,0,0,0.85); color: #fff;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; font-family: sans-serif; text-align: center; padding: 24px;
    }
    #overlay.on { display: flex; }
    #overlay p { font-size: 15px; opacity: 0.8; }
    #retry-btn { display: none; background: #fff; color: #000; border: none; padding: 10px 28px; border-radius: 24px; font-size: 14px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <video id="v" playsinline controls></video>
  <div id="overlay">
    <p id="overlay-msg">Reconectando señal...</p>
    <button id="retry-btn">Reintentar</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/shaka-player@5.0.5/dist/shaka-player.compiled.min.js"></script>
  <script type="module">
    import { createIOSDecryptor } from './js/modules/ios-cenc-decryptor.js';

    const video      = document.getElementById('v');
    const overlay    = document.getElementById('overlay');
    const overlayMsg = document.getElementById('overlay-msg');
    const retryBtn   = document.getElementById('retry-btn');

    let player          = null;
    let decryptor       = null;
    let manifest        = null;
    let reloadInProgress = false;
    let reloadAttempts  = 0;
    let pendingCanplay  = null;
    let stallTimer      = null;

    const showOverlay = (msg, showRetry = false) => {
      overlayMsg.textContent = msg;
      retryBtn.style.display = showRetry ? 'block' : 'none';
      overlay.classList.add('on');
    };
    const hideOverlay = () => overlay.classList.remove('on');

    const setupFilters = (p) => {
      const net = p.getNetworkingEngine();
      net.registerResponseFilter((type, response) => {
        if (type !== shaka.net.NetworkingEngine.RequestType.MANIFEST) return;
        const xml = new TextDecoder().decode(new Uint8Array(response.data));
        response.data = new TextEncoder().encode(
          xml.replace(/<ContentProtection\b[^>]*\/>/g, '')
             .replace(/<ContentProtection\b[\s\S]*?<\/ContentProtection>/g, '')
        ).buffer;
      });
      net.registerResponseFilter(async (type, response) => {
        if (type !== shaka.net.NetworkingEngine.RequestType.SEGMENT) return;
        const bytes = new Uint8Array(response.data);
        const box = bytes.length >= 8 ? String.fromCharCode(bytes[4], bytes[5], bytes[6], bytes[7]) : '';
        if (box === 'ftyp' || box === 'moov') {
          response.data = decryptor.transformInit(response.data);
        } else {
          response.data = await decryptor.decryptMedia(response.data);
        }
      });
    };

    const cancelPendingCanplay = () => {
      if (pendingCanplay) {
        video.removeEventListener('canplay', pendingCanplay);
        pendingCanplay = null;
      }
    };

    const clearStallTimers = () => {
      if (stallTimer) { clearTimeout(stallTimer); stallTimer = null; }
    };

    const playWhenReady = () => {
      cancelPendingCanplay();
      if (video.readyState >= 3) {
        video.play().catch(() => {});
      } else {
        pendingCanplay = () => {
          pendingCanplay = null;
          video.play().catch(() => {});
        };
        video.addEventListener('canplay', pendingCanplay, { once: true });
      }
    };

    video.addEventListener('playing', () => {
      reloadAttempts = 0;
      hideOverlay();
      clearStallTimers();
    });

    video.addEventListener('stalled', () => {
      if (reloadInProgress || stallTimer) return;
      stallTimer = setTimeout(() => {
        stallTimer = null;
        if (reloadInProgress || !player || video.paused) return;
        try { player.retryStreaming(); } catch(e) {}
      }, 4000);
    });

    const doReload = async () => {
      clearStallTimers();
      cancelPendingCanplay();
      if (video.readyState >= 3) { reloadInProgress = false; hideOverlay(); return; }

      try { await player.destroy(); } catch(e) {}
      player = new shaka.Player(video);
      setupFilters(player);
      player.configure({
        manifest: { dash: { clockSyncUri: '' } },
        streaming: { bufferingGoal: 20, rebufferingGoal: 10, lowLatencyMode: false }
      });
      player.addEventListener('error', (event) => {
        if (event.detail.severity !== 2 || reloadInProgress) return;
        setTimeout(() => { if (!reloadInProgress) player.retryStreaming(); }, 500);
      });

      try {
        reloadInProgress = true;
        await player.load(manifest);
        playWhenReady();
      } catch(e) {
        // load failed — next emptied will retry
      } finally {
        reloadInProgress = false;
      }
    };

    video.addEventListener('emptied', () => {
      if (reloadInProgress || !player || !manifest) return;
      if (reloadAttempts >= 8) {
        showOverlay('Señal no disponible — intentá de nuevo en unos minutos', true);
        return;
      }
      video.pause();
      reloadInProgress = true;
      reloadAttempts++;
      const delay = reloadAttempts <= 1 ? 0 : Math.min(reloadAttempts * 2000, 8000);
      showOverlay('Reconectando señal...');
      setTimeout(doReload, delay);
    });

    retryBtn.addEventListener('click', () => {
      if (reloadInProgress) return;
      reloadAttempts = 0;
      reloadInProgress = true;
      showOverlay('Reconectando señal...');
      doReload();
    });

    async function startPlayer(cfg) {
      try {
        manifest = cfg.manifest;
        shaka.polyfill.installAll();
        if (window.ManagedMediaSource) video.disableRemotePlayback = true;

        player = new shaka.Player(video);
        decryptor = await createIOSDecryptor(cfg.key);
        setupFilters(player);
        player.configure({
          manifest: { dash: { clockSyncUri: '' } },
          streaming: { bufferingGoal: 20, rebufferingGoal: 10, lowLatencyMode: false }
        });
        player.addEventListener('error', (event) => {
          if (event.detail.severity !== 2 || reloadInProgress) return;
          setTimeout(() => { if (!reloadInProgress) player.retryStreaming(); }, 500);
        });

        reloadInProgress = true;
        await player.load(manifest);
        reloadInProgress = false;
        video.play().catch(() => {});

      } catch(e) {
        reloadInProgress = false;
        showOverlay('No se pudo iniciar la señal', true);
      }
    }

    window.addEventListener('message', ({ data }) => {
      if (data?.type === 'player-frame-init') startPlayer(data.config);
    });

    window.parent.postMessage({ type: 'player-frame-ready' }, '*');
  </script>
</body>
</html>
